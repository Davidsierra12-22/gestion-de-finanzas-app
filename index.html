<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONEY FLOW - Registro de Gastos</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body style="background-image: url('img/Gemini_Generated_Image_giv1lbgiv1lbgiv1.png');">

    <div class="super-contenedor">
        <header class="header-principal">
            <div class="seccion-logo">
                <img src="img/image-removebg-preview (2).png" alt="Logo" class="logo-imagen">
                <div class="seccion-titulo-lema">
                    <h1 class="logo-titulo">MONEY FLOW</h1>
                    <p class="logo-lema">Simplifica tus finanzas diarias</p>
                </div>
            </div>

            <div class="seccion-acciones-derecha">
                <nav class="navegacion-links">
                    <a href="#">Dashboard</a>
                    <a href="#">Transacciones</a>
                    <a href="#">Reportes</a>
                </nav>
                <div class="iconos-derecha">
                    <span class="material-icons">account_circle</span>
                    <span class="material-icons">settings</span>
                </div>
                <button id="btn-agregar-gasto-superior" class="btn-principal-verde">+ Agregar Gasto</button>
            </div>
        </header>

        <main class="seccion-principal">
            <div class="cabecera-lista">
                <h2>Lista de Gastos Recientes</h2>
                <div class="filtros-lista">
                    <label for="filtro-categoria" style="color: #b0b0b0;">Categoría:</label>
                    <select id="filtro-categoria" class="input-oscuro">
                        <option value="todas">Todas</option>
                        <option value="alimentacion">Alimentación</option>
                        <option value="transporte">Transporte</option>
                        <option value="servicios">Servicios</option>
                        <option value="entretenimiento">Entretenimiento</option>
                        <option value="otros">Otros</option>
                    </select>
                </div>
            </div>

            <table class="tabla-gastos">
                <thead>
                    <tr>
                        <th>FECHA</th>
                        <th>DESCRIPCIÓN</th>
                        <th>CATEGORÍA</th>
                        <th>MONTO (COP)</th>
                        <th>ACCIONES</th>
                    </tr>
                </thead>
                <tbody id="lista-gastos-tbody"></tbody>
            </table>
        </main>

        <div id="popover-agregar" class="popover-formulario oculto">
            <div class="contenido-popover">
                <div class="cabecera-popover">
                    <h3>Nuevo Gasto</h3>
                    <button type="button" id="btn-cerrar-popover" class="btn-cerrar">
                        <span class="material-icons">close</span>
                    </button>
                </div>
                <form id="formulario-gastos" novalidate>
                    <div class="campos-input">
                        <div class="grupo-input">
                            <label for="descripcion-gasto">Descripción</label>
                            <input type="text" id="descripcion-gasto" class="input-form" required>
                        </div>
                        <div class="grupo-input">
                            <label for="categoria-gasto">Categoría</label>
                            <select id="categoria-gasto" class="input-form" required>
                                <option value="" disabled selected>Selecciona una opción</option>
                                <option value="alimentacion">Alimentación</option>
                                <option value="transporte">Transporte</option>
                                <option value="servicios">Servicios</option>
                                <option value="entretenimiento">Entretenimiento</option>
                                <option value="otros">Otros</option>
                            </select>
                        </div>
                        <div class="grupo-input">
                            <label for="monto-gasto">Monto (COP)</label>
                            <input type="number" id="monto-gasto" class="input-form" required min="1">
                        </div>
                        <div class="grupo-input">
                            <label for="fecha-gasto">Fecha</label>
                            <input type="date" id="fecha-gasto" class="input-form" required max="2026-12-31">
                        </div>
                    </div>
                    <button type="submit" id="btn-guardar-gasto-popover" class="btn-principal-verde w-100">Guardar
                        Gasto</button>
                </form>
            </div>
        </div>

        <div class="elementos-flotantes">
            <div class="caja-filtro-fechas">
                <div class="fechas-inputs">
                    <label>Desde: <input type="date" id="fecha-desde" class="input-oscuro"></label>
                    <label>Hasta: <input type="date" id="fecha-hasta" class="input-oscuro"></label>
                </div>
                <div class="botones-filtro">
                    <button id="btn-calcular-manual" class="btn-secundario-azul">CALCULAR BALANCE RANGO</button>
                    <button id="btn-limpiar-fechas" class="btn-secundario-gris">Limpiar Fechas</button>
                </div>
            </div>

            <div class="tarjeta-balance-total">
                <span class="balance-texto">Balance Mostrado:</span>
                <span id="balance-plata" class="balance-monto">$ 0,00</span>
            </div>

            <div id="icono-flotante-agregar" class="icono-agregar-grande">
                <span class="material-icons">add</span>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="app.js"></script>
</body>

</html>
